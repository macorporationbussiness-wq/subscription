{% extends "base.html" %}
{% block title %}{{ website_settings.site_name }} - Admin - Edit Category{% endblock %}
{% block content %}

<style>
    .admin-section {
        padding: 2rem;
        max-width: 700px;
        margin: 0 auto;
    }

    .section-header {
        margin-bottom: 2rem;
    }

    .section-header h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }

    .section-header p {
        color: rgba(255, 255, 255, 0.75);
        margin: 0;
    }

    .admin-nav {
        display: flex;
        gap: 0.8rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
    }

    .admin-nav a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.7rem 1.3rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.9rem;
        font-weight: 600;
        transition: all 0.25s ease;
    }

    .admin-nav a:hover {
        background: var(--gradient);
        border-color: var(--primary-color);
        color: #fff;
    }

    .form-container {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.7rem;
        color: #fff;
        font-weight: 600;
        font-size: 0.95rem;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 0.9rem;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: #fff;
        font-size: 0.95rem;
        transition: all 0.2s ease;
        font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(229, 9, 20, 0.5);
        box-shadow: 0 0 15px rgba(229, 9, 20, 0.2);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 100px;
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
    }

    .btn-submit {
        flex: 1;
        padding: 1rem;
        background: var(--gradient);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(229, 9, 20, 0.4);
    }

    .btn-cancel {
        flex: 1;
        padding: 1rem;
        background: linear-gradient(135deg, #666, #888);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
    }

    .btn-cancel:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 30px rgba(100, 100, 100, 0.4);
    }
</style>

<div class="admin-section">
    <div class="section-header">
        <h1>✏️ Edit Category</h1>
        <p>Update category details</p>
    </div>

    <!-- Admin Navigation -->
    <div class="admin-nav">
        <a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a>
        <a href="{{ url_for('admin_categories') }}">📁 Categories</a>
        <a href="{{ url_for('index') }}">🏠 Home</a>
    </div>

    <!-- Edit Category Form -->
    <div class="form-container">
        <form method="POST">
            <div class="form-group">
                <label for="name">Category Name *</label>
                <input type="text" id="name" name="name" value="{{ category.name if category else '' }}" required placeholder="e.g., Action, Drama, Comedy">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Describe this category...">{{ category.description if category else '' }}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">💾 Save Changes</button>
                <a href="{{ url_for('admin_categories') }}" class="btn-cancel">✕ Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
